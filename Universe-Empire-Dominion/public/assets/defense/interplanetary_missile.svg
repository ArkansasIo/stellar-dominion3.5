<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad_interplanetary_missile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D68910;stop-opacity:1" />
    </linearGradient>
    <filter id="glow_interplanetary_missile">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" fill="url(#grad_interplanetary_missile)" rx="10"/>
  
  <!-- Sci-fi geometric pattern -->
  <g opacity="0.3">
    <circle cx="64" cy="64" r="30" fill="#F8C471" filter="url(#glow_interplanetary_missile)"/>
    <circle cx="192" cy="192" r="25" fill="#F8C471" filter="url(#glow_interplanetary_missile)"/>
    <polygon points="128,64 192,192 64,192" 
             fill="none" stroke="#F8C471" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Icon representation -->
  <g transform="translate(128, 128)">
    <circle r="50" fill="none" stroke="#F8C471" stroke-width="3" opacity="0.8"/>
    <circle r="35" fill="#F8C471" opacity="0.6"/>
  </g>
  
  <!-- Label -->
  <text x="128" y="236" 
        font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        fill="white" text-anchor="middle" opacity="0.9">
    Interplanetary Missile
  </text>
  
  <!-- Category badge -->
  <rect x="5" y="5" width="60" height="20" rx="3" fill="#D68910" opacity="0.8"/>
  <text x="35" y="18" font-family="Arial, sans-serif" font-size="10" 
        fill="white" text-anchor="middle" font-weight="bold">
    DEFENSE
  </text>
</svg>